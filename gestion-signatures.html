<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gestion Signatures — JTCF</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #2a3f4e; min-height: 100vh; }
  header { background: #2a3f4e; padding: 18px 20px; }
  header h1 { color: #fff; font-size: 1.1rem; font-weight: 700; }
  header span { color: #C9A227; font-size: 0.82rem; }
  .container { max-width: 500px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 0.95rem; font-weight: 700; color: #3d5a6e; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #C9A227; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.78rem; font-weight: 700; color: #3d5a6e; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  select, input[type="date"] { width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: inherit; color: #2a3f4e; outline: none; -webkit-appearance: none; background: white; }
  select:focus, input:focus { border-color: #C9A227; }

  .statut-box { background: #f0f2f5; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
  .statut-titre { font-size: 0.78rem; font-weight: 700; color: #3d5a6e; text-transform: uppercase; margin-bottom: 10px; }
  .statut-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; }
  .statut-row:last-child { border-bottom: none; }
  .statut-label { color: #718096; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .badge-signe { background: #c6f6d5; color: #276749; }
  .badge-attente { background: #fed7d7; color: #c53030; }
  .badge-absent { background: #e2e8f0; color: #718096; }

  .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  button { padding: 11px 14px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: #e53e3e; color: #fff; }
  .btn-warning { background: #dd6b20; color: #fff; }
  .btn-primary { background: #C9A227; color: #fff; }
  .btn-success { background: #38a169; color: #fff; }
  .btn-full { grid-column: 1 / -1; }
  .btn-absent { background: #2a3f4e; color: #fff; }

  #log { background: #1a2732; color: #a8d8a8; font-family: monospace; font-size: 0.8rem; padding: 14px; border-radius: 8px; max-height: 200px; overflow-y: auto; display: none; margin-top: 8px; }
  #log.on { display: block; }
  .lok { color: #68d391; } .lerr { color: #fc8181; } .linf { color: #90cdf4; }

  .warn-box { background: #fffbeb; border-left: 4px solid #C9A227; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 0.82rem; margin-bottom: 16px; }
  .loading { text-align: center; color: #718096; padding: 16px; font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <h1>🔧 Gestion des Signatures — JTCF</h1>
  <span>Correction des émargements · Alternants & FC</span>
</header>

<div class="container">

  <div class="warn-box">
    ⚠️ Cet outil modifie directement Firebase. Utilisez-le uniquement pour corriger une erreur.
  </div>

  <div class="card">
    <h2>1️⃣ Sélectionner l'alternant / stagiaire</h2>
    <div class="field">
      <label>Type</label>
      <select id="typeSelect" onchange="chargerListe()">
        <option value="alternants">🔄 Alternant</option>
        <option value="stagiairesFC">🎓 Stagiaire FC</option>
      </select>
    </div>
    <div class="field">
      <label>Personne</label>
      <select id="personneSelect" onchange="chargerStatut()">
        <option value="">-- Chargement... --</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>2️⃣ Sélectionner la date</h2>
    <div class="field">
      <label>Date de la séance</label>
      <input type="date" id="dateSelect" onchange="chargerStatut()" />
    </div>
  </div>

  <div class="card" id="statutCard" style="display:none;">
    <h2>3️⃣ Statut actuel de la séance</h2>
    <div class="statut-box" id="statutBox">
      <div class="loading">Chargement...</div>
    </div>

    <div class="actions-grid" id="actionsGrid" style="display:none;">
      <!-- Boutons injectés dynamiquement -->
    </div>

    <div id="log"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBYPFGv5tMYfKkARO4HeQxPQF_55SpbfgE",
  authDomain: "jtcf-alternance.firebaseapp.com",
  databaseURL: "https://jtcf-alternance-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "jtcf-alternance",
  storageBucket: "jtcf-alternance.firebasestorage.app",
  messagingSenderId: "961150611919",
  appId: "1:961150611919:web:ae8be337575ab1295f62ba"
});
const db = firebase.database();

let personnes = [];

// ── Init date à aujourd'hui ────────────────────────────────────
document.getElementById('dateSelect').value = new Date().toISOString().split('T')[0];

// ── Charger liste personnes ───────────────────────────────────
async function chargerListe() {
  const type = document.getElementById('typeSelect').value;
  const select = document.getElementById('personneSelect');
  select.innerHTML = '<option value="">Chargement...</option>';
  const snap = await db.ref(type).get();
  personnes = [];
  if (snap.exists()) {
    snap.forEach(c => { const p = c.val(); p.id = c.key; personnes.push(p); });
  }
  select.innerHTML = '<option value="">-- Choisir --</option>';
  personnes.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.nom + ' (' + p.id + ')';
    select.appendChild(opt);
  });
  document.getElementById('statutCard').style.display = 'none';
}

// ── Charger statut ────────────────────────────────────────────
async function chargerStatut() {
  const type = document.getElementById('typeSelect').value;
  const id = document.getElementById('personneSelect').value;
  const date = document.getElementById('dateSelect').value;
  if (!id || !date) { document.getElementById('statutCard').style.display = 'none'; return; }

  document.getElementById('statutCard').style.display = 'block';
  document.getElementById('statutBox').innerHTML = '<div class="loading">⏳ Chargement...</div>';
  document.getElementById('actionsGrid').style.display = 'none';

  // Construire la clé Firebase
  const d = new Date(date);
  const y = d.getFullYear(), m = d.getMonth()+1, j = d.getDate();
  const mm = String(m).padStart(2,'0'), jj = String(j).padStart(2,'0');

  const node = type === 'stagiairesFC' ? 'emargementsFC' : 'emargements';
  const key = `${id}_${y}_${m}_${j}`;
  const keyRetro = `${node}/${id}/${y}-${mm}-${jj}`;

  const [snapNormal, snapMatinRetro, snapAMRetro] = await Promise.all([
    db.ref(`${node}/${key}`).get(),
    db.ref(`${keyRetro}/matin`).get(),
    db.ref(`${keyRetro}/apres-midi`).get(),
  ]);

  const dataN = snapNormal.exists() ? snapNormal.val() : null;
  const dataM = snapMatinRetro.exists() ? snapMatinRetro.val() : null;
  const dataA = snapAMRetro.exists() ? snapAMRetro.val() : null;
  const isRetro = !dataN && (dataM || dataA);

  const dateLabel = d.toLocaleDateString('fr-FR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  let html = `<div class="statut-titre">📅 ${dateLabel}</div>`;

  if (!dataN && !dataM && !dataA) {
    html += '<div style="color:#718096;font-size:0.85rem;text-align:center;padding:8px 0;">Aucune donnée pour cette date</div>';
    document.getElementById('statutBox').innerHTML = html;
    document.getElementById('actionsGrid').style.display = 'none';
    return;
  }

  if (isRetro) {
    html += `<div class="statut-row"><span class="statut-label">Type</span><span class="badge badge-attente">Rétroactif</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Matin</span><span class="badge ${dataM?.statut==='present'?'badge-signe':'badge-absent'}">${dataM?.statut==='present'?'✅ Présent':'❌ Absent'} · ${dataM?.mode||'—'}</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Après-midi</span><span class="badge ${dataA?.statut==='present'?'badge-signe':'badge-absent'}">${dataA?.statut==='present'?'✅ Présent':'❌ Absent'} · ${dataA?.mode||'—'}</span></div>`;
  } else {
    const data = dataN || {};
    const absent = data.presence === 'absent';
    html += `<div class="statut-row"><span class="statut-label">Mode</span><span>${data.mode==='presentiel'?'🏫 Présentiel':data.mode==='distanciel'?'🏠 Distanciel':'—'}</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Présence</span><span class="badge ${absent?'badge-absent':'badge-signe'}">${absent?'❌ Absent':'✅ Présent'}</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Sig. Alternant matin</span><span class="badge ${data.matin_alt?'badge-signe':'badge-attente'}">${data.matin_alt?'✅ Signé':'En attente'}</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Sig. Formatrice matin</span><span class="badge ${data.matin_form?'badge-signe':'badge-attente'}">${data.matin_form?'✅ Signé':'En attente'}</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Sig. Alternant AM</span><span class="badge ${data.am_alt?'badge-signe':'badge-attente'}">${data.am_alt?'✅ Signé':'En attente'}</span></div>`;
    html += `<div class="statut-row"><span class="statut-label">Sig. Formatrice AM</span><span class="badge ${data.am_form?'badge-signe':'badge-attente'}">${data.am_form?'✅ Signé':'En attente'}</span></div>`;
    if (data.motif) html += `<div class="statut-row"><span class="statut-label">Motif absence</span><span>${data.motif}</span></div>`;
  }

  document.getElementById('statutBox').innerHTML = html;

  // Boutons d'action
  const grid = document.getElementById('actionsGrid');
  grid.style.display = 'grid';
  grid.innerHTML = '';

  if (!isRetro && dataN) {
    const data = dataN || {};

    // Effacer signatures une par une
    if (data.matin_alt) {
      addBtn(grid, '🗑️ Sig. Alt. Matin', 'btn-danger', () => effacer(`${node}/${key}/matin_alt`, 'Signature alternant matin supprimée'));
    }
    if (data.matin_form) {
      addBtn(grid, '🗑️ Sig. Form. Matin', 'btn-danger', () => effacer(`${node}/${key}/matin_form`, 'Signature formatrice matin supprimée'));
    }
    if (data.am_alt) {
      addBtn(grid, '🗑️ Sig. Alt. AM', 'btn-danger', () => effacer(`${node}/${key}/am_alt`, 'Signature alternant après-midi supprimée'));
    }
    if (data.am_form) {
      addBtn(grid, '🗑️ Sig. Form. AM', 'btn-danger', () => effacer(`${node}/${key}/am_form`, 'Signature formatrice après-midi supprimée'));
    }
    // Marquer absent (efface tout + met absence)
    if (!data.presence || data.presence !== 'absent') {
      addBtn(grid, '❌ Marquer Absent', 'btn-absent btn-full', async () => {
        if (!confirm('Supprimer toutes les signatures et marquer cette personne absente ?')) return;
        await db.ref(`${node}/${key}`).set({ presence: 'absent' });
        log('✅ Marqué absent — signatures effacées', 'ok');
        await chargerStatut();
      });
    }
    // Effacer tout
    addBtn(grid, '🗑️ Tout effacer', 'btn-warning btn-full', async () => {
      if (!confirm('Effacer TOUTES les données de cette séance ?')) return;
      await db.ref(`${node}/${key}`).remove();
      log('✅ Séance effacée', 'ok');
      await chargerStatut();
    });
  }

  if (isRetro) {
    addBtn(grid, '🗑️ Effacer rétro matin', 'btn-danger', () => effacer(`${keyRetro}/matin`, 'Séance rétroactive matin effacée'));
    addBtn(grid, '🗑️ Effacer rétro AM', 'btn-danger', () => effacer(`${keyRetro}/apres-midi`, 'Séance rétroactive après-midi effacée'));
    addBtn(grid, '🗑️ Effacer tout rétro', 'btn-warning btn-full', async () => {
      if (!confirm('Effacer les données rétroactives de cette séance ?')) return;
      await db.ref(keyRetro).remove();
      log('✅ Données rétroactives effacées', 'ok');
      await chargerStatut();
    });
  }
}

function addBtn(grid, label, cls, fn) {
  const btn = document.createElement('button');
  btn.className = cls;
  btn.textContent = label;
  btn.addEventListener('click', fn);
  grid.appendChild(btn);
}

async function effacer(path, msg) {
  try {
    await db.ref(path).remove();
    log('✅ ' + msg, 'ok');
    await chargerStatut();
  } catch(e) {
    log('❌ Erreur : ' + e.message, 'err');
  }
}

function log(msg, type='inf') {
  const div = document.getElementById('log');
  div.classList.add('on');
  const line = document.createElement('div');
  line.className = 'l'+type;
  line.textContent = '[' + new Date().toLocaleTimeString('fr-FR') + '] ' + msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

// Init
chargerListe();
</script>
</body>
</html>
